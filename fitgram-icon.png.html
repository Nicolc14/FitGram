<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genera Icona FitGram</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Arial, sans-serif; gap: 24px; }
  canvas { display: none; }
  img { width: 180px; height: 180px; border-radius: 40px; box-shadow: 0 0 40px rgba(0,245,255,0.3); }
  button { background: #00F5FF; color: #000; border: none; padding: 14px 32px; border-radius: 50px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }
  p { color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; max-width: 300px; }
</style>
</head>
<body>
<img id="preview" src="">
<canvas id="icon" width="180" height="180"></canvas>
<button onclick="scarica()">⬇ Scarica Icona 180x180</button>
<p>Aprire con internet attivo per caricare i font corretti</p>
<script>
document.fonts.ready.then(() => { disegna(); });

function disegna() {
  const canvas = document.getElementById('icon');
  const ctx = canvas.getContext('2d');
  const S = 180;

  // Clip angoli arrotondati
  const r = 40;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(S-r,0); ctx.quadraticCurveTo(S,0,S,r);
  ctx.lineTo(S,S-r); ctx.quadraticCurveTo(S,S,S-r,S);
  ctx.lineTo(r,S); ctx.quadraticCurveTo(0,S,0,S-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.save();
  ctx.clip();

  // SFONDO metà superiore bianca
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, S, S/2);

  // SFONDO metà inferiore: bianco → petrolio → nero
  const bgBot = ctx.createLinearGradient(0, S/2, 0, S);
  bgBot.addColorStop(0,   '#ffffff');
  bgBot.addColorStop(0.4, '#004d4d');
  bgBot.addColorStop(1,   '#000000');
  ctx.fillStyle = bgBot;
  ctx.fillRect(0, S/2, S, S/2);

  // GRADIENTE TESTO: bianco al centro → petrolio → nero in alto
  const textGrad = ctx.createLinearGradient(0, S/2, 0, 0);
  textGrad.addColorStop(0,    '#ffffff');
  textGrad.addColorStop(0.45, '#004d4d');
  textGrad.addColorStop(1,    '#000000');

  const fitSize = 42;
  const gramSize = 52;

  ctx.font = `italic 900 ${fitSize}px "Inter", sans-serif`;
  const fitW = ctx.measureText('Fit').width;
  ctx.font = `700 ${gramSize}px "Dancing Script", cursive`;
  const gramW = ctx.measureText('Gram').width;

  const totalW = fitW + gramW - 2;
  const startX = (S - totalW) / 2;
  const centerY = S / 2 + 4;

  ctx.fillStyle = textGrad;

  ctx.font = `italic 900 ${fitSize}px "Inter", sans-serif`;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.fillText('Fit', startX, centerY);

  ctx.font = `700 ${gramSize}px "Dancing Script", cursive`;
  ctx.fillText('Gram', startX + fitW - 2, centerY + 4);

  ctx.restore();

  // Mostra anteprima
  document.getElementById('preview').src = canvas.toDataURL('image/png');
}

function scarica() {
  const link = document.createElement('a');
  link.download = 'fitgram-icon.png';
  link.href = document.getElementById('icon').toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
